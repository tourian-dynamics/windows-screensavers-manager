[package]
name = "rsav"
version = "2.4.0"
edition = "2024"
rust-version = "1.85"
[features]
default = ["downloader"]
downloader = ["dep:ureq", "dep:serde", "dep:serde_json"]

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
winreg = "0.52"
sysinfo = "0.30"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_Console",
    "Win32_System_Power",
    "Win32_System_Shutdown",
    "Win32_UI_Accessibility",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Graphics_Gdi",
    "Win32_UI_HiDpi",
    "Win32_System_Threading",
]}
ureq = { version = "2.9", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }

[build-dependencies]
embed-resource = "2.5"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
